name: CI Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 pytest pytest-cov

      - name: Lint
        run: |
          flake8 . --max-line-length=120 --exclude=.git,__pycache__ || echo "No Python files to lint yet"

      - name: Run tests
        run: |
          pytest --cov=. --cov-report=term-missing || echo "No tests yet"

      - name: Docker build test
        run: docker build -t supply-network-management-test .
